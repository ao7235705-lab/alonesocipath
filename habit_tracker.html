<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#05161c;
    --bg2:#0a2730;
    --panel:rgba(255,255,255,0.04);
    --panel-strong:rgba(255,255,255,0.07);
    --line:rgba(255,255,255,0.09);
    --ink:#eaf6f5;
    --muted:#7fa4a8;
    --gold:#e8b758;
    --gold-soft:rgba(232,183,88,0.16);
    --teal:#34d6c4;
    --green:#46c98a;
    --red:#e8745f;
    --rad:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;}
  #app{
    font-family:'Outfit',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 85% -10%, rgba(52,214,196,0.10), transparent 55%),
      radial-gradient(90% 60% at 10% 110%, rgba(232,183,88,0.08), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100vh;
    padding:18px 14px 60px;
    max-width:560px;
    margin:0 auto;
  }
  .loading{text-align:center;padding:80px 0;color:var(--muted);font-size:15px;}

  /* header */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .brand{font-family:'Fraunces',serif;font-weight:900;font-size:26px;line-height:1;letter-spacing:-0.5px;}
  .brand span{color:var(--gold);}
  .weekbadge{font-size:12px;color:var(--gold);background:var(--gold-soft);border:1px solid rgba(232,183,88,0.25);padding:6px 11px;border-radius:999px;font-weight:600;white-space:nowrap;}

  /* date nav */
  .datenav{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px 10px;}
  .datenav button{background:none;border:none;color:var(--ink);font-size:22px;width:40px;height:40px;border-radius:10px;cursor:pointer;}
  .datenav button:active{background:var(--panel-strong);}
  .dcenter{text-align:center;}
  .dcenter .d1{font-family:'Fraunces',serif;font-weight:600;font-size:19px;}
  .dcenter .d2{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .gymday{color:var(--teal);font-weight:600;}
  .today-btn{font-size:11px;color:var(--gold);background:none;border:1px solid rgba(232,183,88,0.3);border-radius:999px;padding:4px 10px;cursor:pointer;margin-top:4px;}

  /* progress ring summary */
  .summary{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:16px;margin:12px 0;}
  .ring{position:relative;width:74px;height:74px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:20px;}
  .sumtxt .t1{font-size:13px;color:var(--muted);}
  .sumtxt .t2{font-family:'Fraunces',serif;font-size:17px;margin-top:2px;}

  /* week strip */
  .strip{display:flex;gap:6px;margin:4px 0 14px;}
  .strip .day{flex:1;text-align:center;padding:8px 0;border-radius:12px;background:var(--panel);border:1px solid var(--line);cursor:pointer;}
  .strip .day.sel{border-color:var(--gold);background:var(--gold-soft);}
  .strip .day .dn{font-size:10px;color:var(--muted);}
  .strip .day .num{font-size:15px;font-weight:600;margin-top:2px;}
  .strip .day .dot{width:6px;height:6px;border-radius:50%;margin:4px auto 0;background:rgba(255,255,255,0.12);}
  .strip .day .dot.done{background:var(--green);}

  .sec-title{font-family:'Fraunces',serif;font-size:15px;color:var(--muted);margin:20px 4px 8px;letter-spacing:0.3px;}

  /* habit card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:13px;transition:.15s;}
  .card.done{background:rgba(70,201,138,0.10);border-color:rgba(70,201,138,0.3);}
  .ic{width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--panel-strong);}
  .cbody{flex:1;min-width:0;}
  .ctitle{font-size:15px;font-weight:500;}
  .csub{font-size:12px;color:var(--muted);margin-top:2px;}
  .check{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .check.on{background:var(--green);border-color:var(--green);}
  .check.on::after{content:"✓";color:#04140d;font-weight:700;font-size:16px;}

  /* numeric counter card */
  .counter{display:flex;align-items:center;gap:6px;}
  .counter button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--panel-strong);color:var(--ink);font-size:18px;cursor:pointer;}
  .counter .val{min-width:42px;text-align:center;font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;}
  .target-pill{font-size:11px;color:var(--gold);background:var(--gold-soft);padding:3px 8px;border-radius:999px;margin-left:4px;}
  .bar{height:5px;background:var(--panel-strong);border-radius:99px;margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:99px;transition:.3s;}

  /* language chips */
  .langs{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .chip{font-size:12px;padding:7px 11px;border-radius:11px;border:1px solid var(--line);background:var(--panel-strong);cursor:pointer;color:var(--muted);}
  .chip.on{background:var(--gold-soft);border-color:rgba(232,183,88,0.4);color:var(--gold);font-weight:600;}
  .chip small{opacity:.7;font-weight:400;}

  .month-card{background:linear-gradient(180deg,rgba(232,183,88,0.07),var(--panel));border:1px solid rgba(232,183,88,0.18);border-radius:var(--rad);padding:14px;margin-bottom:9px;}

  .note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:22px;line-height:1.6;}
  .reset{display:block;margin:10px auto 0;background:none;border:1px solid var(--line);color:var(--muted);font-size:11px;padding:6px 14px;border-radius:999px;cursor:pointer;}
</style>

<div id="app"><div class="loading">Yuklanmoqda…</div></div>

<script>
(function(){
  const app = document.getElementById('app');
  const UZ_DAYS = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  const UZ_MON = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  const GYM_DAYS = [1,3,5]; // Mon, Wed, Fri

  // ---- date helpers ----
  const fmt = d => d.toISOString().slice(0,10);
  const today = new Date(); today.setHours(12,0,0,0);
  let viewDate = new Date(today);
  let startDate = null;

  // habit definitions (daily checkboxes)
  const HABITS = [
    {id:'fajr',  ic:'🕌', t:'Fajr nomozi', s:'04:00 · 15 daqiqa'},
    {id:'abs',   ic:'🔥', t:'Qorin mashqlari', s:'15–20 daqiqa'},
    {id:'steps', ic:'👟', t:'10 000+ qadam', s:'Kunlik piyoda'},
    {id:'read',  ic:'📖', t:'Kitob 50+ sahifa', s:"5 tilda o'qish"},
    {id:'phd',   ic:'🎓', t:'PhD ilmiy ish', s:'Komplayns nazorat · 30–60 daq'},
    {id:'diet',  ic:'🥗', t:"Sog'lom ovqatlanish", s:'Rejaga amal qildim'},
  ];
  const LANGS = [
    {id:'en', t:'Ingliz', lvl:'C1'},
    {id:'ru', t:'Rus', lvl:'C1'},
    {id:'de', t:'Nemis', lvl:'B1'},
    {id:'ar', t:'Arab', lvl:'B1'},
  ];

  // ---- storage wrappers (safe) ----
  async function sget(key){
    try{ const r = await window.storage.get(key); return r? JSON.parse(r.value): null; }
    catch(e){ return null; }
  }
  async function sset(key,val){
    try{ await window.storage.set(key, JSON.stringify(val)); }catch(e){}
  }

  // ---- target math: weekly +10% ----
  function weekIndex(d){
    const ms = d - startDate;
    return Math.max(0, Math.floor(ms / (7*86400000)));
  }
  const pushupWeekly = wi => Math.round(1000 * Math.pow(1.1, wi));
  const turnikDaily  = wi => Math.round(20   * Math.pow(1.1, wi));

  // week start date (aligned to startDate)
  function weekStart(d){
    const wi = weekIndex(d);
    const ws = new Date(startDate); ws.setDate(ws.getDate()+wi*7); ws.setHours(12,0,0,0);
    return ws;
  }

  let dayData = {};   // current viewDate data
  let monthData = {}; // current month data

  async function loadDay(){
    dayData = await sget('day:'+fmt(viewDate)) || {};
    const mk = 'month:'+fmt(viewDate).slice(0,7);
    monthData = await sget(mk) || {};
  }

  // ---- render ----
  async function render(){
    const dow = viewDate.getDay();
    const wi = weekIndex(viewDate);
    const isGym = GYM_DAYS.includes(dow);
    const pushTarget = pushupWeekly(wi);
    const turnTarget = turnikDaily(wi);

    // weekly pushup total
    const ws = weekStart(viewDate);
    let weekPush = 0;
    for(let i=0;i<7;i++){ const dd=new Date(ws); dd.setDate(dd.getDate()+i);
      const o = await sget('day:'+fmt(dd)); if(o&&o.pushups) weekPush += o.pushups; }

    // completion count for ring (daily items)
    const dailyTotal = HABITS.length + 1 /*turnik*/ + 1 /*languages-any*/ + (isGym?1:0) + 1 /*pushup logged*/;
    let doneCount = 0;
    HABITS.forEach(h=>{ if(dayData[h.id]) doneCount++; });
    if((dayData.turnik||0) >= turnTarget) doneCount++;
    if(LANGS.some(l=>dayData['lang_'+l.id])) doneCount++;
    if((dayData.pushups||0) > 0) doneCount++;
    if(isGym && dayData.gym) doneCount++;
    const pct = Math.round(doneCount/dailyTotal*100);

    const sameAsToday = fmt(viewDate)===fmt(today);

    app.innerHTML = `
      <div class="top">
        <div class="brand">Inti<span>zom</span></div>
        <div class="weekbadge">Hafta ${wi+1} / 13</div>
      </div>

      <div class="datenav">
        <button id="prev">‹</button>
        <div class="dcenter">
          <div class="d1">${viewDate.getDate()}-${UZ_MON[viewDate.getMonth()]}</div>
          <div class="d2 ${isGym?'gymday':''}">${UZ_DAYS[dow]}${isGym?' · GYM kuni':''}</div>
          ${sameAsToday?'':'<button class="today-btn" id="gotoday">Bugunga qaytish</button>'}
        </div>
        <button id="next">›</button>
      </div>

      <div class="summary">
        <div class="ring">
          <svg width="74" height="74" viewBox="0 0 74 74">
            <circle cx="37" cy="37" r="32" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
            <circle cx="37" cy="37" r="32" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"
              stroke-dasharray="${2*Math.PI*32}" stroke-dashoffset="${2*Math.PI*32*(1-pct/100)}"/>
            <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#34d6c4"/><stop offset="1" stop-color="#e8b758"/>
            </linearGradient></defs>
          </svg>
          <div class="pct">${pct}%</div>
        </div>
        <div class="sumtxt">
          <div class="t1">Bugungi bajarilgan</div>
          <div class="t2">${doneCount} / ${dailyTotal} maqsad</div>
        </div>
      </div>

      <div id="strip" class="strip"></div>

      <div class="sec-title">Mashg'ulot</div>

      <!-- pushup -->
      <div class="card">
        <div class="ic">💪</div>
        <div class="cbody">
          <div class="ctitle">Push-up <span class="target-pill">hafta: ${pushTarget}</span></div>
          <div class="csub">Bugun qo'shilgan · haftalik jami ${weekPush}/${pushTarget}</div>
          <div class="bar"><i style="width:${Math.min(100,weekPush/pushTarget*100)}%"></i></div>
        </div>
        <div class="counter" data-key="pushups" data-step="10">
          <button class="minus">−</button>
          <div class="val">${dayData.pushups||0}</div>
          <button class="plus">+</button>
        </div>
      </div>

      <!-- turnik -->
      <div class="card ${(dayData.turnik||0)>=turnTarget?'done':''}">
        <div class="ic">🤸</div>
        <div class="cbody">
          <div class="ctitle">Turnik tortish <span class="target-pill">kun: ${turnTarget}</span></div>
          <div class="csub">Bugun ${dayData.turnik||0} / ${turnTarget}</div>
          <div class="bar"><i style="width:${Math.min(100,(dayData.turnik||0)/turnTarget*100)}%"></i></div>
        </div>
        <div class="counter" data-key="turnik" data-step="5">
          <button class="minus">−</button>
          <div class="val">${dayData.turnik||0}</div>
          <button class="plus">+</button>
        </div>
      </div>

      ${isGym?`
      <div class="card ${dayData.gym?'done':''}" data-toggle="gym">
        <div class="ic">🏋️</div>
        <div class="cbody"><div class="ctitle">GYM (2 soat)</div><div class="csub">Dush · Chor · Juma</div></div>
        <div class="check ${dayData.gym?'on':''}"></div>
      </div>`:''}

      <div class="sec-title">Kunlik intizom</div>
      <div id="habits"></div>

      <!-- languages -->
      <div class="card" style="display:block">
        <div style="display:flex;align-items:center;gap:13px">
          <div class="ic">🗣️</div>
          <div class="cbody"><div class="ctitle">Til o'rganish</div><div class="csub">So'z · grammatika · matn · diktant</div></div>
        </div>
        <div class="langs">
          ${LANGS.map(l=>`<div class="chip ${dayData['lang_'+l.id]?'on':''}" data-lang="${l.id}">${l.t} <small>${l.lvl}</small></div>`).join('')}
        </div>
      </div>

      <div class="sec-title">Oylik maqsadlar · ${UZ_MON[viewDate.getMonth()]}</div>
      <div class="month-card" data-month="article" style="display:flex;align-items:center;gap:13px;cursor:pointer">
        <div class="ic">📝</div>
        <div class="cbody"><div class="ctitle">Ilmiy maqola</div><div class="csub">Oyiga 1 ta</div></div>
        <div class="check ${monthData.article?'on':''}"></div>
      </div>
      <div class="month-card" data-month="sura" style="display:flex;align-items:center;gap:13px;cursor:pointer">
        <div class="ic">📿</div>
        <div class="cbody"><div class="ctitle">Quron surasi</div><div class="csub">Yozib, ma'nosi bilan yodlash</div></div>
        <div class="check ${monthData.sura?'on':''}"></div>
      </div>

      <div class="note">
        3 oylik dastur · 13 hafta. Push-up &amp; turnik haftasiga +10%.<br>
        Tana tarkibi (15–20%) maqsadini parhez bo'yicha shifokor/nutritsiolog bilan kelishib boring.
      </div>
      <button class="reset" id="reset">Bugungi belgilarni tozalash</button>
    `;

    renderStrip();
    renderHabits();
    bind(turnTarget);
  }

  function renderHabits(){
    const wrap = document.getElementById('habits');
    wrap.innerHTML = HABITS.map(h=>`
      <div class="card ${dayData[h.id]?'done':''}" data-toggle="${h.id}">
        <div class="ic">${h.ic}</div>
        <div class="cbody"><div class="ctitle">${h.t}</div><div class="csub">${h.s}</div></div>
        <div class="check ${dayData[h.id]?'on':''}"></div>
      </div>`).join('');
  }

  async function renderStrip(){
    const strip = document.getElementById('strip');
    const ws = weekStart(viewDate);
    let html='';
    for(let i=0;i<7;i++){
      const dd=new Date(ws); dd.setDate(dd.getDate()+i); dd.setHours(12,0,0,0);
      const sel = fmt(dd)===fmt(viewDate);
      const o = await sget('day:'+fmt(dd));
      const any = o && Object.values(o).some(v=> v===true || (typeof v==='number'&&v>0));
      html += `<div class="day ${sel?'sel':''}" data-date="${fmt(dd)}">
        <div class="dn">${UZ_DAYS[dd.getDay()].slice(0,3)}</div>
        <div class="num">${dd.getDate()}</div>
        <div class="dot ${any?'done':''}"></div>
      </div>`;
    }
    strip.innerHTML = html;
    strip.querySelectorAll('.day').forEach(el=>{
      el.onclick = async()=>{ viewDate = new Date(el.dataset.date+'T12:00:00'); await loadDay(); render(); };
    });
  }

  function bind(turnTarget){
    document.getElementById('prev').onclick = async()=>{ viewDate.setDate(viewDate.getDate()-1); await loadDay(); render(); };
    document.getElementById('next').onclick = async()=>{ viewDate.setDate(viewDate.getDate()+1); await loadDay(); render(); };
    const gt = document.getElementById('gotoday');
    if(gt) gt.onclick = async()=>{ viewDate=new Date(today); await loadDay(); render(); };

    // checkbox toggles
    document.querySelectorAll('[data-toggle]').forEach(c=>{
      c.onclick = async()=>{ const k=c.dataset.toggle; dayData[k]=!dayData[k]; await sset('day:'+fmt(viewDate),dayData); render(); };
    });
    // language chips
    document.querySelectorAll('[data-lang]').forEach(c=>{
      c.onclick = async()=>{ const k='lang_'+c.dataset.lang; dayData[k]=!dayData[k]; await sset('day:'+fmt(viewDate),dayData); render(); };
    });
    // counters
    document.querySelectorAll('.counter').forEach(c=>{
      const key=c.dataset.key, step=+c.dataset.step;
      c.querySelector('.plus').onclick = async()=>{ dayData[key]=(dayData[key]||0)+step; await sset('day:'+fmt(viewDate),dayData); render(); };
      c.querySelector('.minus').onclick = async()=>{ dayData[key]=Math.max(0,(dayData[key]||0)-step); await sset('day:'+fmt(viewDate),dayData); render(); };
    });
    // month toggles
    document.querySelectorAll('[data-month]').forEach(c=>{
      c.onclick = async()=>{ const k=c.dataset.month; monthData[k]=!monthData[k]; await sset('month:'+fmt(viewDate).slice(0,7),monthData); render(); };
    });
    // reset day
    document.getElementById('reset').onclick = async()=>{ dayData={}; await sset('day:'+fmt(viewDate),{}); render(); };
  }

  // ---- init ----
  (async function(){
    let s = await sget('settings');
    if(!s || !s.startDate){
      // default start = the Monday of this week
      const m = new Date(today); const back=(m.getDay()+6)%7; m.setDate(m.getDate()-back); m.setHours(12,0,0,0);
      s = {startDate: fmt(m)};
      await sset('settings', s);
    }
    startDate = new Date(s.startDate+'T12:00:00');
    await loadDay();
    render();
  })();
})();
</script>
